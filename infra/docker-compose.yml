version: "3.9"

services:
  marl-inference-engine:
    build:
      context: ..
      dockerfile: apps/marl-inference-engine/Dockerfile
    container_name: marl-inference-engine
    ports:
      - "50051:50051"
    restart: always

  streaming-analytics:
    build:
      context: ..
      dockerfile: apps/streaming-analytics/Dockerfile
    container_name: streaming-analytics
    ports:
      - "8000:8000"
    environment:
      - MARL_HOST=marl-inference-engine
    depends_on:
      - marl-inference-engine
    restart: always

  telemetry-producer:
    build:
      context: ..
      dockerfile: apps/telemetry-producer/Dockerfile
    container_name: telemetry-producer
    environment:
      - ANALYTICS_WS_URL=ws://streaming-analytics:8000/ws/telemetry
    depends_on:
      - streaming-analytics
    restart: always

  web-visualizer:
    build:
      context: ..
      dockerfile: apps/web-visualizer/Dockerfile
    container_name: web-visualizer
    ports:
      - "3000:3000"
    depends_on:
      - streaming-analytics
    restart: always
